name: secret

on: push

jobs:
  use-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Echo secret safely
        run: echo "The secret is \${{ secrets.SECRET }}"

      # Optional: use the secret in an environment variable
      - name: Use secret in env
        env:
          MY_SECRET: ${{ secrets.SECRET }}
        run: |
          echo "Using secret internally without printing"
