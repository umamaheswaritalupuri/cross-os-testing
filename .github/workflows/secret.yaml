name: secret

on: push

jobs:
  use-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Echo secret safely
        run: echo "The secret is \${{ secrets.SECRET }}"

      # ✅ Proper usage block — secret is consumed safely
      - name: Use secret internally
        env:
          MY_SECRET: ${{ secrets.SECRET }}
        run: |
          echo "Using secret internally without printing"
